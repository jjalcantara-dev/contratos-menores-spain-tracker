name: Actualizar Contratos Menores

on:
  schedule:
    # Cada domingo a las 3:00 UTC (4:00 hora España invierno / 5:00 verano)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub Actions

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scraper.py

      - name: Notificar fallo (opcional)
        if: failure()
        run: echo "El scraper ha fallado. Revisa los logs en Actions."
